services:
  - type: web
    name: sistematienda-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: true
      - key: DB_SSL_CA_PATH
        value: ./certs/isrgrootx1.pem
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: true
      - key: CORS_ORIGINS
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CASHIER_DESKTOP_ONLY
        value: true
      - key: CASHIER_ALLOW_WEB_LOGIN
        value: false
      - key: CASHIER_ALLOWED_IPS
        sync: false
      - key: CASHIER_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: sistematienda-web
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
